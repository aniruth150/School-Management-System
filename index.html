<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | School Management System</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to the School Management System</p>

    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Enter your password" />
      </div>

      <button type="submit" class="btn">Log In</button>
    </form>

    <p class="switch-link">
      Don't have an account? <a href="register.html">Register as Student / Teacher</a>
    </p>

    <p class="switch-link" style="margin-top:6px;">
     <!---Admin login: <strong>admin@school.com</strong> / <strong>Admin@123</strong>--->
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // If already logged in, skip straight to dashboard
  const existingUser = getStoredUser();
  if (existingUser && getToken()) {
    goToDashboard(existingUser.role);
  }

  const form = document.getElementById("loginForm");
  const alertBox = document.getElementById("alertBox");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    alertBox.innerHTML = "";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const data = await apiRequest("/auth/login", {
        method: "POST",
        body: { email, password },
      });

      saveSession(data.token, data.user);
      goToDashboard(data.user.role);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert error">${err.message}</div>`;
    }
  });
</script>

</body>
</html>
