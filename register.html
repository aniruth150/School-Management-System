<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register | School Management System</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Create an account</h1>
    <p class="subtitle">Register as a Student or Teacher</p>

    <div id="alertBox"></div>

    <div class="role-toggle">
      <label id="studentLabel" class="active">
        <input type="radio" name="role" value="student" checked />
        <span>Student</span>
      </label>
      <label id="teacherLabel">
        <input type="radio" name="role" value="teacher" />
        <span>Teacher</span>
      </label>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" required placeholder="Jane Doe" />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="text" id="phone" placeholder="Optional" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="At least 6 characters" />
      </div>

      <!-- Student-only fields -->
      <div id="studentFields" class="extra-fields visible">
        <div class="form-group">
          <label for="class_name">Class / Grade</label>
          <input type="text" id="class_name" placeholder="e.g. 10th Grade - Section A" />
        </div>
        <div class="form-group">
          <label for="roll_number">Roll number</label>
          <input type="text" id="roll_number" placeholder="e.g. 2026-045" />
        </div>
      </div>

      <!-- Teacher-only fields -->
      <div id="teacherFields" class="extra-fields">
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" placeholder="e.g. Mathematics" />
        </div>
        <div class="form-group">
          <label for="qualification">Qualification</label>
          <input type="text" id="qualification" placeholder="e.g. M.Sc, B.Ed" />
        </div>
      </div>

      <button type="submit" class="btn">Create Account</button>
    </form>

    <p class="switch-link">
      Already have an account? <a href="index.html">Log in here</a>
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  const studentLabel = document.getElementById("studentLabel");
  const teacherLabel = document.getElementById("teacherLabel");
  const studentFields = document.getElementById("studentFields");
  const teacherFields = document.getElementById("teacherFields");

  document.querySelectorAll('input[name="role"]').forEach((radio) => {
    radio.addEventListener("change", (e) => {
      const isStudent = e.target.value === "student";
      studentLabel.classList.toggle("active", isStudent);
      teacherLabel.classList.toggle("active", !isStudent);
      studentFields.classList.toggle("visible", isStudent);
      teacherFields.classList.toggle("visible", !isStudent);
    });
  });

  const form = document.getElementById("registerForm");
  const alertBox = document.getElementById("alertBox");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    alertBox.innerHTML = "";

    const role = document.querySelector('input[name="role"]:checked').value;

    const payload = {
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      password: document.getElementById("password").value,
      role,
    };

    if (role === "student") {
      payload.class_name = document.getElementById("class_name").value.trim();
      payload.roll_number = document.getElementById("roll_number").value.trim();
    } else {
      payload.subject = document.getElementById("subject").value.trim();
      payload.qualification = document.getElementById("qualification").value.trim();
    }

    try {
      await apiRequest("/auth/register", { method: "POST", body: payload });
      alertBox.innerHTML = `<div class="alert success">Registration successful! Redirecting to login...</div>`;
      setTimeout(() => (window.location.href = "index.html"), 1200);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert error">${err.message}</div>`;
    }
  });
</script>

</body>
</html>
