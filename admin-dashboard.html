<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard | School Management System</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="brand">🏫 School Admin</div>
  <div class="nav-right">
    <span class="user-badge" id="userBadge">Admin</span>
    <button class="btn danger small" onclick="logout()">Log Out</button>
  </div>
</nav>

<div class="dashboard">
  <h1>Admin Dashboard</h1>
  <p class="page-subtitle">Overview of all registered students and teachers.</p>

  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-value" id="studentCount">-</div>
      <div class="stat-label">Total Students</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="teacherCount">-</div>
      <div class="stat-label">Total Teachers</div>
    </div>
  </div>

  <div class="section-card">
    <h2>Students</h2>
    <div id="studentsArea" class="loading">Loading students...</div>
  </div>

  <div class="section-card">
    <h2>Teachers</h2>
    <div id="teachersArea" class="loading">Loading teachers...</div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
